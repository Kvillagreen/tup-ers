<section class="w-full min-h-screen flex-cols">
    <div
        class="max-w-full w-full min-h-screen flex text-gray-50  items-start pt-12 pb-8 justify-center bg-gradient-to-t from-red-600 via-red-300 to-red-50 bg-cover bg-center bg-fixed">
        <!-- Semi-transparent overlay -->
        <div
            class="relative w-[400px] h-full flex flex-col items-center justify-center bg-red-300/20 backdrop-blur-lg rounded-lg border-red-300/30 border-2 shadow-lg ">
            <div class="w-full h-full">
                <img src="../../../assets/images/background.jpg" class="w-full h-40 rounded-t-lg object-cover">
            </div>
            <form class="relative w-full h-full flex flex-col z-10 space-y-2 p-6" (submit)="router.navigate(['/dashboard'])">
                <p class="text-center font-bold text-xl">Welcome back TUPVian</p>
                <div class="flex flex-col pt-2">
                    <label>TUPV ID</label>
                    <input type="text" class="input" required placeholder="TUPV ID">
                </div>
                <div class="flex flex-col">
                    <label>Password</label>
                    <input type="password" class="input" required placeholder="Password">
                </div>
                <div class="flex justify-between text-xs ">
                    <div class="flex justify-center align-center">
                        <input type="checkbox" class="mr-1">
                        <p>Remember me</p>
                    </div>
                    <a href="#" class="font-bold">Forget password?</a>
                </div>
                <div class="flex justify-between ">
                    <button type="submit"
                        class="bg-red-600 border-[1px] w-full border-red-800 p-2 text-sm hover:bg-red-700">Login</button>
                </div>
                <div class="flex flex-col text-center text-xs ">
                    <p>Don't have an account? <span><a (click)="router.navigate(['/signup'])" class="cursor-pointer font-bold">Register</a></span></p>
                </div>
            </form>
        </div>
    </div>
</section>
