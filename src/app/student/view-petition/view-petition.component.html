<div class="flex flex-col items-center justify-center w-full h-full py-2">
    <div class="w-3/4 min-h-screen bg-[#f5f3f4] rounded-md  p-4 space-y-2">
        <div class="flex justify-start align-center">
            <p class="text-2xl">All Petitions</p>
        </div>
        <div class="flex justify-between align-center w-full space-x-2">
            <div class="flex justify-between align-center w-1/3 space-x-2">
                <button
                    class="w-3/4 h-full bg-red-500 py-2 rounded-md text-gray-50  hover:bg-red-800 hover:text-gray-300">Filter
                    Petition</button>
            </div>
            <div class="flex justify-between items-center w-1/2">
                <div class="relative w-full">
                    <input type="text" placeholder="Search Petition"
                        class="w-full outline-2 outline-red-950 border-red-950 border-2 rounded-md px-10 py-2">
                    <svg xmlns="http://www.w3.org/2000/svg"
                        class="absolute top-1/2 left-3 transform -translate-y-1/2 w-5 h-5 text-red-950" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M11 4a7 7 0 100 14 7 7 0 000-14zM21 21l-4.35-4.35" />
                    </svg>
                </div>
            </div>
        </div>
        <div
            class="grid grid-cols-7 w-full h-12 bg-red-800 text-center  text-xs md:text-[16px] text-white rounded-t-md font-semibold justify-center items-center">
            <div class="">Date Created</div>
            <div class="">Subject Code</div>
            <div class="col-span-2">Subject Name</div>
            <div class="">Year Level</div>
            <div class="">No. of Units</div>
            <div class="">Apply</div>
        </div>
        <div
            class="grid grid-cols-7 w-full h-12 bg-red-300 text-center text-xs md:text-[14px] text-gray-900 justify-center items-center">
            <div class="">January 1 2024</div>
            <div class="">ELEX</div>
            <div class="col-span-2">Electronics Techniques</div>
            <div class="">2nd Year</div>
            <div class="">3</div>
            <div class="">
                <button (click)="isApply=!isApply"
                    class="w-3/4 h-full bg-red-500 py-2 rounded-md text-gray-50  hover:bg-red-800 hover:text-gray-300">Apply</button>
            </div>
        </div>
    </div>
</div>

<div *ngIf="isApply">
    <div class="animate-fadeIn fixed inset-0 flex items-center justify-center bg-gray-900 bg-opacity-50 z-[100]">
        <div class="w-1/4 h-5/6 bg-red-300 rounded-md text-red-800 p-4 flex flex-col align-center relative">
            <!-- Header Section -->
            <div class="flex w-full justify-center items-center">
                <p class="text-left text-xl font-bold">Petition Application</p>
                <!-- Close Button -->
                <button (click)="isApply=!isApply"
                    class="absolute top-2 right-2 w-8 h-8 py-1 bg-red-500 rounded-full text-white flex items-center justify-center text-xl">
                    ×
                </button>
            </div>
            <!-- Timeline Section -->
            <div class="flex flex-col w-full h-full mt-4">
                
            </div>
        </div>

        <div class="hidden absolute inset-0 flex-col items-center justify-center  h-full w-full z-[100]">
            <!-- Spinning Loader -->
            <img src="/assets/images/tupSeal.png" class="animate-spin-5s rounded-full h-20 w-20 " />
            <!-- Loading Text -->
            <p class="mt-4 font-bold text-xs text-gray-50 animate-pulse">loading...</p>
        </div>
    </div>
</div>
