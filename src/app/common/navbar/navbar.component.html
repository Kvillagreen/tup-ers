<!--For Dashboard-->
<div *ngIf="urlChecker()==true"
    class="flex justify-between items-center w-full h-full bg-gradient-to-r px-3  from-red-800 via-red-400 to-red-800 bg-fixed ">
    <div class="flex items-center w-full ">
        <img src="/assets/images/tupSeal.png" class="size-20 p-2 object-cover">
        <p class="md:text-lg text-sm font-semibold text-red-100">TECHNOLOGICAL UNIVERSITY OF THE PHILIPPINES</p>
    </div>
    <div class="flex w-full justify-end space-x-2">
        <a [routerLink]="['/dashboard']" routerLinkActive="active" class="navButton">Home</a>
        <a [routerLink]="['/receive-petition']" routerLinkActive="active" class="navButton">Recieve Petitions</a>
        <a [routerLink]="['/view-petition']" routerLinkActive="active" class="navButton">View Petitions</a>
        <a [routerLink]="['/track-petition']" routerLinkActive="active" class="navButton">Track Petitions</a>
        <div #dropDown (click)="settingsDropdown=!settingsDropdown" class="flex items-center h-5 px-2 py-2 cursor-pointer text-white font-bold">TUPV-20-2248<span><svg xmlns="http://www.w3.org/2000/svg"
                    width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-down">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg></span></div>
    </div>
    <div *ngIf="settingsDropdown"
        class="absolute flex flex-col text-center px-2 text-white py-5 top-16 right-4 rounded-md h-[280px] w-[200px] bg-[#c1121f] z-10 shadow-md shadow-black">
        <p class="text-white text-lg font-semibold">Karl Villaverde</p>
        <p class="text-sm">F05-C</p>
        <hr class="mt-2">
        <div class="flex flex-col w-full space-y-2 pt-2">
            <a [routerLink]="['/track-petition']" routerLinkActive=""
                class="w-full hover:bg-red-300 hover:rounded-sm py-2 flex justify-center space-x-2 items-center">
                <img src="/assets/svg/user.svg"><span>Profile</span>
            </a>
            <a [routerLink]="['/login']" routerLinkActive=""
                class="w-full hover:bg-red-300 hover:rounded-sm py-2 flex justify-center space-x-2 items-center"><img
                    src="/assets/svg/logout.svg"><span>Logout</span></a>
        </div>
    </div>
</div>
<!--For Login and Sign up -->
<div *ngIf="urlChecker()==false"
    class="flex w-full h-20 bg-gradient-to-r shadow-md shadow-red-950 from-red-800 via-red-400 to-red-800 items-center px-3 bg-cover bg-fixed ">
    <div class="flex items-center">
        <img src="/assets/images/tupSeal.png" class="size-20 p-2 object-cover">
        <p class="md:text-lg text-sm font-semibold text-red-100">TECHNOLOGICAL UNIVERSITY OF THE PHILIPPINES</p>
    </div>
</div>
